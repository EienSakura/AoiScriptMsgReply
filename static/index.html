<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aoi小葵脚本通知接收器</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>
    <main class="container">
      <section class="hero">
        <div class="hero-head">
          <div class="source-nav" aria-label="来源切换">
            <button class="source-tab active" data-source="all" type="button">全部</button>
            <button class="source-tab" data-source="zzz" type="button">ZZZ</button>
            <button class="source-tab" data-source="bgi" type="button">BGI</button>
            <button class="source-tab" data-source="sr" type="button">SR</button>
          </div>
          <div class="hero-title-group">
            <p class="eyebrow">Aoi 小葵脚本通知接收器</p>
            <h1>AoiScriptMsgReply</h1>
          </div>
        </div>
        <p id="heroSub" class="sub">查看 Aoi 小葵最近 7 天接收的脚本消息，并按来源和日期快速切换。</p>
      </section>

      <section class="panel">
        <h2>选择日期</h2>
        <div id="dayTabs" class="day-tabs"></div>
      </section>

      <section class="panel content-panel">
        <div class="panel-header">
          <h2 id="contentTitle">内容列表</h2>
          <div class="sort-switch" aria-label="时间排序">
            <button id="sortDescBtn" class="sort-btn active" type="button">时间倒序</button>
            <button id="sortAscBtn" class="sort-btn" type="button">时间正序</button>
          </div>
        </div>
        <div id="list" class="list"></div>
      </section>
    </main>

    <script>
      const sourceTabs = Array.from(document.querySelectorAll(".source-tab"));
      const dayTabs = document.getElementById("dayTabs");
      const list = document.getElementById("list");
      const contentTitle = document.getElementById("contentTitle");
      const heroSub = document.getElementById("heroSub");
      const sortDescBtn = document.getElementById("sortDescBtn");
      const sortAscBtn = document.getElementById("sortAscBtn");

      const sourceMeta = {
        all: { label: "全部", desc: "查看 Aoi 小葵最近 7 天接收的全部脚本消息。" },
        zzz: { label: "ZZZ", desc: "只查看 ZenlessZoneZero-OneDragon 写入的小葵消息。" },
        bgi: { label: "BGI", desc: "只查看 better-genshin-impact 写入的小葵消息。" },
        sr: { label: "SR", desc: "查看 March7th Assistant 写入的小葵消息。" }
      };

      let selectedSource = "all";
      let selectedDay = null;
      let currentItems = [];
      let sortOrder = "desc";

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderEmpty(message) {
        list.innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
      }

      function formatDisplayTime(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return escapeHtml(String(value));
        }
        return date.toLocaleString("zh-CN", {
          hour12: false,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
      }

      function getSourceLabel(source) {
        return sourceMeta[source]?.label || String(source || "").toUpperCase();
      }

      function getSortedItems(items) {
        const factor = sortOrder === "asc" ? 1 : -1;
        return [...items].sort((a, b) => {
          const aTime = new Date(a.timestamp).getTime();
          const bTime = new Date(b.timestamp).getTime();
          return (aTime - bTime) * factor;
        });
      }

      function updateSortButtons() {
        sortDescBtn.classList.toggle("active", sortOrder === "desc");
        sortAscBtn.classList.toggle("active", sortOrder === "asc");
      }

      function updateSourceTabs() {
        sourceTabs.forEach((button) => {
          button.classList.toggle("active", button.dataset.source === selectedSource);
        });
        heroSub.textContent = sourceMeta[selectedSource].desc;
      }

      function renderTabs(days) {
        dayTabs.innerHTML = "";
        if (!days.length) {
          dayTabs.innerHTML = `<div class="empty">当前来源最近 7 天暂无数据</div>`;
          return;
        }

        days.forEach((day) => {
          const button = document.createElement("button");
          button.className = "day-tab" + (day === selectedDay ? " active" : "");
          button.textContent = day;
          button.addEventListener("click", async () => {
            selectedDay = day;
            renderTabs(days);
            await loadItems(day);
          });
          dayTabs.appendChild(button);
        });
      }

      function renderItems(day, items) {
        const sourceLabel = getSourceLabel(selectedSource);
        contentTitle.textContent = day ? `${sourceLabel} · ${day}` : `${sourceLabel} 内容列表`;
        if (!items.length) {
          renderEmpty("该筛选条件下暂无内容");
          return;
        }

        list.innerHTML = getSortedItems(items)
          .map((item, idx) => {
            const title = escapeHtml(item.title);
            const content = escapeHtml(item.content).replaceAll("\n", "<br/>");
            const imageHtml = item.image
              ? `<img class="item-image" src="${escapeHtml(item.image)}" alt="内容图片" loading="lazy" onerror="this.style.display='none'" />`
              : "";
            const divider = idx < items.length - 1 ? `<hr class="divider" />` : "";
            return `
              <article class="item">
                <div class="item-meta-row">
                  <span class="item-meta">${formatDisplayTime(item.timestamp)}</span>
                  <span class="source-badge source-${escapeHtml(item.source)}">${getSourceLabel(item.source)}</span>
                </div>
                <p class="item-title">${title}</p>
                <p class="text">${content}</p>
                ${imageHtml}
                ${divider}
              </article>
            `;
          })
          .join("");
      }

      async function loadItems(day) {
        const params = new URLSearchParams();
        if (day) params.set("day", day);
        if (selectedSource) params.set("source", selectedSource);
        const res = await fetch(`/api/items?${params.toString()}`);
        if (!res.ok) {
          renderEmpty("加载失败，请稍后重试");
          return;
        }
        const data = await res.json();
        currentItems = data.items || [];
        renderItems(data.day, currentItems);
      }

      async function loadDays() {
        const params = new URLSearchParams();
        if (selectedSource) params.set("source", selectedSource);
        const res = await fetch(`/api/days?${params.toString()}`);
        if (!res.ok) {
          renderEmpty("日期加载失败");
          return [];
        }
        const data = await res.json();
        return data.days || [];
      }

      async function refreshBoard() {
        renderEmpty("正在加载...");
        const days = await loadDays();
        selectedDay = days[0] || null;
        renderTabs(days);
        await loadItems(selectedDay);
      }

      sourceTabs.forEach((button) => {
        button.addEventListener("click", async () => {
          selectedSource = button.dataset.source;
          updateSourceTabs();
          await refreshBoard();
        });
      });

      sortDescBtn.addEventListener("click", () => {
        sortOrder = "desc";
        updateSortButtons();
        renderItems(selectedDay, currentItems);
      });

      sortAscBtn.addEventListener("click", () => {
        sortOrder = "asc";
        updateSortButtons();
        renderItems(selectedDay, currentItems);
      });

      async function init() {
        updateSourceTabs();
        updateSortButtons();
        await refreshBoard();
      }

      init();
    </script>
  </body>
</html>
